spring.application.name=sistema-inventario

server.port=8862

spring.datasource.url=jdbc:postgresql://localhost:5432/inventario_data
spring.datasource.username=disquser
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||||

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.thymeleaf.cache=false

# Límite de subida de archivos (foto del repuesto). Por defecto es 1MB y provoca error 413.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
