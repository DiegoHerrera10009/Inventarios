<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PuntoBodega - Inicio</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', serif;
            background-image: url('/images/inicio.png'); /* Usa tu imagen aquí */
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }

        .contenido {
            margin-left: 80px;
        }

        h1 {
            font-size: 60px;
            color: #000;
            font-style: italic;
            font-weight: bold;
            margin-bottom: 50px;
        }

        .boton {
            display: flex;
            align-items: center;
            background-color: #8B5E3C;
            color: #fff;
            border: none;
            padding: 15px 25px;
            margin-bottom: 25px;
            font-size: 18px;
            border-radius: 30px;
            width: 220px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }

        .boton::before {
            content: '';
            display: inline-block;
            width: 40px;
            height: 40px;
            background-color: white;
            border-radius: 50%;
            margin-right: 15px;
        }

        .boton:hover {
            background-color: #6c452d;
        }
    </style>
</head>
<body>
<div class="contenido">
    <h1>PUNTOBODEGA</h1>
    <a th:href="@{/login}" class="boton">Iniciar Sesión</a>
    <a th:href="@{/registro}" class="boton">Registrarse</a>
</div>
</body>
</html>
