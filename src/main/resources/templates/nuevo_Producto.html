<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Producto</title>
    <style>
        body {
            background-image: url('/images/FondoBodega1.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.4);
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .form-box {
            position: relative;
            z-index: 1;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2d3436;
        }

        label {
            display: block;
            margin-top: 15px;
            color: #2d3436;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background-color: #6e4c1e;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        button:hover {
            background-color: #8e5c28;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            display: block;
            color: black;
            text-decoration: none;
            margin-top: 10px;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="form-box">
    <h2>Registrar Nuevo Producto</h2>
    <form th:action="@{/producto/guardar}" th:object="${producto}" method="post">
        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}" required />

        <label>Cantidad:</label>
        <input type="number" th:field="*{cantidad}" required />

        <label>Precio:</label>
        <input type="number" step="0.01" th:field="*{precio}" required />

        <button type="submit">Guardar</button>
    </form>
    <div class="links">
        <a th:href="@{/producto/lista}">Ver lista de productos</a>
        <a th:href="@{/menu}">Volver al Menú</a>
    </div>
</div>
</body>
</html>
