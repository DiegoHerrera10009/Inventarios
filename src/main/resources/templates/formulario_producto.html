<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Producto</title>
</head>
<body>
<h1 th:text="${#fields.hasErrors('*') ? 'Corregir errores' : 'Nuevo Producto'}"></h1>
<form th:action="@{/admin/productos/guardar}" th:object="${producto}" method="post">
    <label>Nombre: <input type="text" th:field="*{nombre}" required/></label><br>
    <label>Categoría: <input type="text" th:field="*{categoria}" required/></label><br>
    <label>Descripción: <input type="text" th:field="*{descripcion}"/></label><br>
    <label>Precio: <input type="number" step="0.01" th:field="*{precio}" required/></label><br>
    <label>Unidad: <input type="text" th:field="*{unidad}" required/></label><br>
    <label>Presentación: <input type="text" th:field="*{presentacion}"/></label><br>
    <label>Fecha de Vencimiento: <input type="date" th:field="*{fechaVencimiento}"/></label><br>
    <label>Código de Barras: <input type="text" th:field="*{codigoBarras}"/></label><br>
    <button type="submit">Guardar</button>
</form>
<a th:href="@{/admin/productos}">Volver</a>
</body>
</html>
