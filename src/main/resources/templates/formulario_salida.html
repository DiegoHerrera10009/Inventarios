<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registrar salida - Inventario Repuestos</title>
    <link rel="stylesheet" th:href="@{/css/industrial.css}">
</head>
<body class="industrial">
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <span class="sidebar-logo"></span>
                    <div class="sidebar-title">
                        <span>Inventario</span>
                        <small>Repuestos diesel</small>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <p class="sidebar-section-label">Panel</p>
                <a th:href="@{/menu}" class="sidebar-link">
                    <span class="sidebar-icon">📊</span>
                    <span>Dashboard</span>
                </a>

                <p class="sidebar-section-label">Inventario</p>
                <a th:href="@{/producto/lista}" class="sidebar-link">
                    <span class="sidebar-icon">📦</span>
                    <span>Productos</span>
                </a>
                <a th:href="@{/salida/formulario}" class="sidebar-link is-active">
                    <span class="sidebar-icon">📤</span>
                    <span>Registrar salida</span>
                </a>
                <a th:href="@{/salida/historial}" class="sidebar-link">
                    <span class="sidebar-icon">📑</span>
                    <span>Movimientos</span>
                </a>

                <div class="sidebar-footer">
                    <a th:href="@{/logout}" class="sidebar-link sidebar-link-logout">
                        <span class="sidebar-icon">🚪</span>
                        <span>Cerrar sesión</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Contenido principal -->
        <main class="layout-main">
        <div class="panel" style="max-width: 480px;">
            <div class="panel-header">
                <div class="panel-header-icon">📤</div>
                <div class="panel-header-text">
                    <h2>Registrar salida de repuesto</h2>
                    <p class="subtitle">Registra venta, taller o garantía.</p>
                </div>
            </div>

            <form th:action="@{/salida/registrar}" th:object="${salida}" method="post" id="formSalida">
                <label>Repuesto</label>
                <div class="searchable-select" id="searchableProducto">
                    <select th:field="*{producto.id}" id="productoSelect" required class="searchable-select-hidden">
                        <option value="">Buscar o elegir repuesto…</option>
                        <option th:each="prod : ${productos}" th:value="${prod.id}"
                                th:data-codigo="${prod.codigo != null ? prod.codigo : ''}"
                                th:data-marca="${prod.marca != null ? prod.marca : ''}"
                                th:text="${(prod.codigo != null && !prod.codigo.isEmpty() ? prod.codigo + ' — ' : '') + prod.nombre + (prod.marca != null && !prod.marca.isEmpty() ? ' (' + prod.marca + ')' : '') + (prod.tipoEquipo != null && !prod.tipoEquipo.isEmpty() ? ' [' + prod.tipoEquipo + ']' : '')}">Nombre</option>
                    </select>
                    <input type="text"
                           class="searchable-select-input"
                           id="productoSearch"
                           placeholder="Buscar por código, nombre o marca…"
                           autocomplete="off"
                           aria-label="Buscar repuesto">
                    <div class="searchable-select-dropdown" id="productoDropdown" role="listbox"></div>
                </div>

                <label>Cantidad</label>
                <input type="number" th:field="*{cantidad}" min="1" required>

                <label>Motivo (venta, taller, garantía…)</label>
                <input type="text" th:field="*{motivo}" required>

                <button type="submit">Registrar salida</button>
            </form>

            <p class="error" th:if="${error}" th:text="${error}"></p>
            <a th:href="@{/menu}" class="form-link">← Volver al menú</a>
        </div>
        </main>
    </div>

    <script>
(function() {
    var select = document.getElementById('productoSelect');
    var input = document.getElementById('productoSearch');
    var dropdown = document.getElementById('productoDropdown');
    if (!select || !input || !dropdown) return;

    var options = [];
    var opts = select.querySelectorAll('option');
    for (var i = 0; i < opts.length; i++) {
        var o = opts[i];
        if (!o.value) continue;
        options.push({
            value: o.value,
            text: o.textContent.trim(),
            codigo: o.getAttribute('data-codigo') || '',
            marca: o.getAttribute('data-marca') || ''
        });
    }

    function buildSearchText(item) {
        return (item.codigo + ' ' + item.text + ' ' + item.marca).toLowerCase();
    }

    function renderList(filter) {
        var term = (filter || '').toLowerCase().trim();
        var list = term
            ? options.filter(function(item) { return buildSearchText(item).indexOf(term) !== -1; })
            : options;
        dropdown.innerHTML = '';
        list.forEach(function(item) {
            var div = document.createElement('div');
            div.className = 'searchable-select-option';
            div.setAttribute('role', 'option');
            div.setAttribute('data-value', item.value);
            div.textContent = item.text;
            div.addEventListener('click', function() {
                select.value = item.value;
                input.value = item.text;
                input.classList.remove('placeholder');
                dropdown.classList.remove('is-open');
                input.blur();
            });
            dropdown.appendChild(div);
        });
        dropdown.classList.toggle('is-open', list.length > 0);
    }

    input.addEventListener('focus', function() {
        renderList(input.value);
    });
    input.addEventListener('input', function() {
        renderList(input.value);
    });
    input.addEventListener('blur', function() {
        setTimeout(function() { dropdown.classList.remove('is-open'); }, 200);
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.searchable-select')) dropdown.classList.remove('is-open');
    });

    if (select.value) {
        var sel = options.filter(function(o) { return o.value === select.value; })[0];
        if (sel) { input.value = sel.text; input.classList.remove('placeholder'); }
    }
})();
    </script>
</body>
</html>
