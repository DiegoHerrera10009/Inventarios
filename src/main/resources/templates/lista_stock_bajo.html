<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stock bajo - Inventario Repuestos</title>
    <link rel="stylesheet" th:href="@{/css/industrial.css}">
</head>
<body class="industrial">
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <span class="sidebar-logo"></span>
                    <div class="sidebar-title">
                        <span>Inventario</span>
                        <small>Repuestos diesel</small>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <p class="sidebar-section-label">Panel</p>
                <a th:href="@{/menu}" class="sidebar-link">
                    <span class="sidebar-icon">📊</span>
                    <span>Dashboard</span>
                </a>

                <p class="sidebar-section-label">Inventario</p>
                <a th:href="@{/producto/lista}" class="sidebar-link is-active">
                    <span class="sidebar-icon">📦</span>
                    <span>Productos</span>
                </a>
                <a th:href="@{/salida/formulario}" class="sidebar-link">
                    <span class="sidebar-icon">📤</span>
                    <span>Registrar salida</span>
                </a>
                <a th:href="@{/salida/historial}" class="sidebar-link">
                    <span class="sidebar-icon">📑</span>
                    <span>Movimientos</span>
                </a>

                <div class="sidebar-footer">
                    <a th:href="@{/logout}" class="sidebar-link sidebar-link-logout">
                        <span class="sidebar-icon">🚪</span>
                        <span>Cerrar sesión</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Contenido principal -->
        <main class="layout-main">
        <div class="panel panel-inline">
            <div class="panel-header">
                <div class="panel-header-icon">⚠️</div>
                <div class="panel-header-text">
                    <h2>Repuestos con stock bajo</h2>
                    <p class="subtitle">Cantidad menor o igual al stock mínimo configurado.</p>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th>Marca</th>
                            <th>Stock</th>
                            <th>Mín.</th>
                            <th>Precio</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="producto : ${productos}"
                            th:classappend="${producto.stockMinimo != null and producto.cantidad <= producto.stockMinimo} ? 'alerta'">
                            <td th:text="${producto.codigo}">—</td>
                            <td th:text="${producto.nombre}">—</td>
                            <td th:text="${producto.marca}">—</td>
                            <td th:text="${producto.cantidad}">—</td>
                            <td th:text="${producto.stockMinimo}">—</td>
                            <td th:text="${'$ ' + #numbers.formatDecimal(producto.precio, 1, 'POINT', 2, 'COMMA')}">—</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="btn-group">
                <a th:href="@{/producto/lista}" class="btn btn-primary">Ver todo el inventario</a>
                <a th:href="@{/menu}" class="btn btn-secondary">Volver al menú</a>
            </div>
        </div>
        </main>
    </div>
</body>
</html>
