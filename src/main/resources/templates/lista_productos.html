<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Productos</title>
    <style>
        body {
            background-image: url('/images/FondoBodega1.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.4);
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: 90%;
            max-width: 800px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2d3436;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: center;
        }

        th {
            background-color: #dfe6e9;
        }

        a.button {
            display: inline-block;
            background-color: #6e4c1e;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            margin: 10px;
            transition: background-color 0.3s ease;
        }

        a.button:hover {
            background-color: #8e5c28;
        }

        .botones {
            text-align: center;
        }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="container">
    <h2>Lista de Productos</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Cantidad</th>
            <th>Precio</th>
        </tr>
        <tr th:each="producto : ${productos}">
            <td th:text="${producto.id}">ID</td>
            <td th:text="${producto.nombre}">Nombre</td>
            <td th:text="${producto.cantidad}">Cantidad</td>
            <td th:text="${producto.precio}">Precio</td>
        </tr>
    </table>

    <div class="botones">
        <a class="button" th:href="@{/producto/formulario}">Agregar Nuevo Producto</a>
        <a class="button" th:href="@{/menu}">Volver al Menú</a>
    </div>
</div>
</body>
</html>
