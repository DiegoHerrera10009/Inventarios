<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('/images/registro_fondo.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .overlay {
            background-color: rgba(0, 0, 0, 0.4);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .form-container {
            position: relative;
            z-index: 1;
            background-color: rgba(255, 255, 255, 0.85);
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #000;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: none;
            border-radius: 50px;
            text-align: center;
            font-weight: bold;
            background-color: #fff;
            color: #000;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background-color: #a0522d;
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #8b4513;
        }

        a {
            display: block;
            margin-top: 20px;
            color: #fff;
            font-weight: bold;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        @media (max-width: 400px) {
            .form-container {
                width: 90%;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
<div class="overlay"></div>
<div class="form-container">
    <h2>REGISTRO DE USUARIO</h2>
    <form th:action="@{/registro}" method="post" th:object="${usuario}">
        <input type="text" th:field="*{nombre}" placeholder="Nombre de usuario" required>
        <input type="email" th:field="*{correo}" placeholder="Correo Electrónico" required>
        <input type="password" th:field="*{contrasena}" placeholder="Contraseña" required>
        <button type="submit">Registrarse</button>
    </form>
    <a th:href="@{/}">Volver al inicio</a>
</div>
</body>
</html>
