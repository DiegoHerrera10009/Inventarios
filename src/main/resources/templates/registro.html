<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - Inventario Repuestos</title>
    <link rel="stylesheet" th:href="@{/css/industrial.css}">
</head>
<body class="industrial">
    <div class="page-center">
        <div class="panel">
            <h2>Registro de usuario</h2>
            <p class="subtitle">Crea tu cuenta para usar el inventario de repuestos.</p>
            <form th:action="@{/registro}" method="post" th:object="${usuario}">
                <label>Usuario</label>
                <input type="text" th:field="*{nombre}" placeholder="Nombre de usuario" required>
                <label>Correo electrónico</label>
                <input type="email" th:field="*{correo}" placeholder="Correo electrónico" required>
                <label>Contraseña</label>
                <input type="password" th:field="*{contrasena}" placeholder="Contraseña" required>
                <button type="submit">Registrarse</button>
            </form>
            <a th:href="@{/}" class="form-link">← Volver al inicio</a>
        </div>
    </div>
</body>
</html>
